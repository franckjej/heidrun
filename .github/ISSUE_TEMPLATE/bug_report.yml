name: Bug Report
description: Report a bug in the Heidrun Mac client
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug report. Please fill in the details below so the
        issue can be reproduced. For security vulnerabilities, do **not** use
        this form — see the security policy linked on the new-issue page.
  - type: input
    id: version
    attributes:
      label: Heidrun version
      description: See **Heidrun → About Heidrun**. Include the build number.
      placeholder: "1.0.0 (581)"
    validations:
      required: true
  - type: input
    id: macos
    attributes:
      label: macOS version
      description: See **Apple menu → About This Mac**.
      placeholder: "macOS 26.1 (Tahoe)"
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: What did you do, step by step?
      placeholder: |
        1. Connect to …
        2. Open the Files window
        3. Drag a folder out to the Desktop
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected vs actual behaviour
      description: What did you expect to happen, and what happened instead?
    validations:
      required: true
  - type: input
    id: server
    attributes:
      label: Server (optional)
      description: Which server/version were you connected to, if relevant?
      placeholder: "heidrun-server 1.0.0-rc7 / Hotline 1.2.3 / …"
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Console logs (optional)
      description: Relevant output from Console.app, filtered to Heidrun. This is rendered as code, so no backticks needed.
      render: text
    validations:
      required: false
